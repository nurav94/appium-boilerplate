# ============================================================
# APPIUM BOILERPLATE — CONFIG FILE
# Edit this file to match your app and device setup
# ============================================================

# ===== PLATFORM =====
# Options: Android | iOS
platform=Android

# ===== ANDROID DEVICE / EMULATOR =====
android.deviceName=Pixel_5_API_33
android.udid=emulator-5554
android.platformVersion=13
android.automationName=UIAutomator2

# ===== iOS DEVICE / SIMULATOR =====
ios.deviceName=iPhone 14
ios.udid=YOUR_IOS_UDID_HERE
ios.platformVersion=16
ios.automationName=xcuitest
ios.xcodeOrgId=YOUR_XCODE_ORG_ID
ios.xcodeSigningId=iPhone Developer

# ===== APP PATHS =====
# Android APK — place your APK inside installationFiles/ folder
android.appPath=installationFiles/app-debug.apk
android.appPackage=com.example.app
android.appActivity=com.example.app.MainActivity

# iOS App — place your .app inside installationFiles/ folder
ios.appPath=installationFiles/YourApp.app

# ===== APPIUM SERVER =====
appium.serverUrl=http://127.0.0.1
appium.port=4723

# ===== APP BEHAVIOUR =====
# fullReset=true  → Uninstall + reinstall app fresh before each run
# fullReset=false → Keep installed app (faster but may have stale state)
app.fullReset=true
app.autoGrantPermissions=true
app.newCommandTimeout=60

# ===== DEVICE UNLOCK (Android) =====
# Set unlock type: pin | pattern | password | fingerprint
# Leave blank if device/emulator has no lock
android.unlockType=pin
android.unlockKey=0000

# ===== WAIT TIMEOUTS (seconds) =====
timeout.implicit=10
timeout.explicit=15
timeout.fluent=6
timeout.fluentPoll=100

# ===== ADB LOGCAT =====
# Set to true to capture ADB logcat per test and attach to Allure
# Set to false to disable (useful for beginners or iOS-only runs)
adb.logcat.enabled=true

# ===== TEST DATA =====
# Path to your Excel test data file
testdata.path=TestData/sample_data.xlsx
testdata.sheet=LoginData

# ===== REPORTING =====
allure.results.dir=allure-results

# ===== BASE URL (if testing API as well) =====
api.baseUrl=https://api.example.com
